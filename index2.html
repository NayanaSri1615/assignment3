<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: white;
    }

    
  

    .content {
      padding: 50px;
    }

   
    ul.custom-list {
      list-style: none;
      padding-left: 0;
    }

    ul.custom-list li::before {
      content: '★';
      color: red;
      margin-right: 10px;
      font-size: 20px;
    }

    ul.custom-list li {
      font-size: 20px;
      margin: 10px 0;
    }
  </style>
</head>
<body>



  <div class="content">
    <ul class="custom-list">
      <li>Hummus</li>
      <li>Pita</li>
      <li>Green salad</li>
      <li>Halloumi</li>
    </ul>
  </div>

</body>
</html>
